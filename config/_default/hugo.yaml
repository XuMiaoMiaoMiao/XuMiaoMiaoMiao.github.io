# Configuration of Hugo
# Guide: https://docs.hugoblox.com/tutorial/
title: 'Miao Xu'
baseURL: 'https://xumiaomiaomiao.github.io/'

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

enableEmoji: true
enableRobotsTXT: true
summaryLength: 30

timeout: 600000

pagination:
  pagerSize: 10

outputs:
  home: [HTML, RSS, headers, redirects, backlinks]
  section: [HTML, RSS]

taxonomies:
  author: authors
  tag: tags
  publication_type: publication_types

markup:
  _merge: deep
  highlight:
    lineNos: false

imaging:
  resampleFilter: lanczos
  quality: 90
  anchor: smart
  hint: picture

build:
  writeStats: true
  buildStats:
    enable: true

security:
  _merge: deep

sitemap:
  _merge: deep
