    org: FAST Lab, Zhejiang University
    location: Zhejiang, China
    start: 2023-07-01
    end: 2025-08-31
    summary: |
      Worked on quadrotor control and air-ground cooperative robotics.
      Developed a multiple non-inertial frames based air-ground cooperative framework for UAV transitions between UGVs.
      Designed a phase-adaptive model predictive controller with a position reference scheme for cross-vehicle transition tasks.
      Continued research on robust UAV landing on dynamic platforms using robocentric modelling and L1-adaptive MPC.
