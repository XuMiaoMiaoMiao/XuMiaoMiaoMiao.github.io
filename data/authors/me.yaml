bio: |
  Hi! I am Miao Xu (徐淼), currently pursuing a master's degree in Machine Learning, Systems and Control at Lund University, supported by a full scholarship.

  Before my master's studies, I worked as a research assistant at [FAST Lab (Fire Group)](https://fast-fire.github.io/), Zhejiang University, under the supervision of [Yanjun Cao](https://scholar.google.com/citations?user=Q44CBbgAAAAJ&hl=zh-CN). My research focused on quadrotor control, air-ground cooperative robotics, and robust landing on dynamic platforms.

  Prior to that, I received dual bachelor's degrees in Control in Technical Systems and Automation from ITMO University and Hangzhou Dianzi University, graduating with honours (2 \%).

